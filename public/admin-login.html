<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Access - NodeVault</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <nav>
      <a href="/" class="nav-brand">NodeVault</a>
    </nav>

    <div class="container" style="padding-top: 3rem">
      <div class="card">
        <div class="form-header">
          <h1>Admin Access</h1>
          <p style="font-size: 0.9rem; color: var(--neutral-500)">
            Authorized personnel only
          </p>
        </div>

        <div class="alert alert-error" id="alert-error"></div>

        <form id="admin-login-form">
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="admin@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary" id="submit-btn">
            Access Dashboard
          </button>
        </form>

        <div class="form-footer" style="font-size: 0.8rem">
          This page is restricted.
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("admin-login-form");
      const errorEl = document.getElementById("alert-error");
      const submitBtn = document.getElementById("submit-btn");
      const BASE_URL = "https://nodevault-backend-k0jb.onrender.com/";

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorEl.classList.remove("show");

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Authenticating...';

        try {
          const res = await fetch('${BASE_URL}/api/login', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorEl.textContent = data.error || "Login failed";
            errorEl.classList.add("show");
            return;
          }

          //check role
          if (data.user.role !== "admin") {
            await fetch("/api/logout", {
              method: "POST",
              credentials: "include",
            });

            errorEl.textContent = "Access denied: Admin accounts only";
            errorEl.classList.add("show");
            return;
          }

          //only admin enters dashboard
          window.location.href = "/admin.html";
        } catch {
          errorEl.textContent = "Server error";
          errorEl.classList.add("show");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Access Dashboard";
        }
      });
    </script>
  </body>
</html>
