<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - NodeVault</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <nav>
      <a href="/" class="nav-brand">NodeVault Admin</a>
      <div class="nav-links">
        <button
          onclick="logoutAdmin()"
          class="btn btn-secondary"
          style="padding: 0.4rem 0.875rem; font-size: 0.85rem"
        >
          Logout
        </button>
      </div>
    </nav>

    <div class="container-wide" style="padding-top: 2rem; max-width: 1200px">
      <div class="dashboard-header">
        <div>
          <h1>Admin Dashboard</h1>
          <p style="color: var(--neutral-500)">
            Manage users and monitor all platform entries.
          </p>
        </div>
        <span class="user-badge">Administrator</span>
      </div>

      <div class="alert alert-error" id="alert-error"></div>
      <div class="alert alert-success" id="alert-success"></div>

      <div
        style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px"
      >
        <button class="btn btn-primary" onclick="loadUsers()">Users</button>
        <button class="btn btn-primary" onclick="loadEntries()">Entries</button>
      </div>

      <!-- Users Section -->
      <div class="card" style="margin-bottom: 24px">
        <div class="entries-header" style="margin-bottom: 16px">
          <h2>Registered Users</h2>
          <span class="entries-count" id="users-count">0</span>
        </div>
        <div id="users"></div>
      </div>

      <!-- Entries Section -->
      <div class="card">
        <div class="entries-header" style="margin-bottom: 16px">
          <h2>All User Entries</h2>
          <span class="entries-count" id="entries-count">0</span>
        </div>
        <div id="entries"></div>
      </div>
    </div>

    <script>
      const BASE_URL = "https://nodevault-backend-k0jb.onrender.com/";
      function showAlert(type, msg) {
        const errorEl = document.getElementById("alert-error");
        const successEl = document.getElementById("alert-success");

        if (type === "error") {
          errorEl.textContent = msg;
          errorEl.classList.add("show");
          successEl.classList.remove("show");
        } else {
          successEl.textContent = msg;
          successEl.classList.add("show");
          errorEl.classList.remove("show");
        }

        setTimeout(() => {
          errorEl.classList.remove("show");
          successEl.classList.remove("show");
        }, 3000);
      }

      function formatIST(dateString) {
        return new Date(dateString).toLocaleString("en-IN", {
          timeZone: "Asia/Kolkata",
          day: "2-digit",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      async function checkAdmin() {
        try {
          const res = await fetch('${BASE_URL}/api/admin/users', {
            credentials: "include",
          });

          if (!res.ok) {
            window.location.href = "/admin-login.html";
          }
        } catch {
          window.location.href = "/admin-login.html";
        }
      }

      async function loadUsers() {
        try {
          const res = await fetch('${BASE_URL}/api/admin/users', {
            credentials: "include",
          });
          const data = await res.json();

          if (!res.ok) {
            showAlert("error", data.error || "Failed to load users.");
            return;
          }

          document.getElementById("users-count").textContent =
            data.users.length;

          document.getElementById("users").innerHTML = data.users
            .map(
              (u) => `
          <div class="entry-item" style="margin-bottom:12px;">
            <div class="entry-content">
              <div class="entry-text">${u.name}</div>
              <div class="entry-date">${u.email} • ${u.role}</div>
            </div>
            ${
              u.role === "admin"
                ? `<button class="btn btn-secondary" disabled>Protected</button>`
                : `<button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button>`
            }
          </div>
        `,
            )
            .join("");
        } catch {
          showAlert("error", "Failed to load users.");
        }
      }

      async function deleteUser(id) {
        if (!confirm("Delete this user account?")) return;

        try {
          const res = await fetch(`${BASE_URL}/api/admin/user/${id}`, {
            method: "DELETE",
            credentials: "include",
          });

          const data = await res.json();

          if (!res.ok) {
            showAlert("error", data.error || "Failed to delete user.");
            return;
          }

          showAlert("success", "User deleted successfully.");
          loadUsers();
          loadEntries();
        } catch {
          showAlert("error", "Failed to delete user.");
        }
      }

      async function loadEntries() {
        try {
          const res = await fetch('{BASE_URL}/api/admin/entries', {
            credentials: "include",
          });
          const data = await res.json();

          if (!res.ok) {
            showAlert("error", data.error || "Failed to load entries.");
            return;
          }

          document.getElementById("entries-count").textContent =
            data.entries.length;

          document.getElementById("entries").innerHTML = data.entries
            .map(
              (e) => `
          <div class="entry-item" style="margin-bottom:12px;">
            <div class="entry-content">
              <div class="entry-text">${e.content}</div>

              <div class="entry-date" style="display:flex; justify-content:space-between; align-items:center;">
                
                <div>
                  ${e.name} (${e.email}) • ${formatIST(e.created_at)}
                </div>

                ${
                  e.role === "admin"
                    ? `
                  <span style="
                    background:#2563eb;
                    color:white;
                    padding:3px 8px;
                    border-radius:12px;
                    font-size:11px;
                    font-weight:500;
                  ">
                    ADMIN
                  </span>
                `
                    : ""
                }

              </div>

            </div>
            <button class="btn btn-danger" onclick="deleteEntry(${e.id})">Delete</button>
          </div>
        `,
            )
            .join("");
        } catch {
          showAlert("error", "Failed to load entries.");
        }
      }

      async function deleteEntry(id) {
        if (!confirm("Delete this entry?")) return;

        try {
          const res = await fetch(`{BASE_URL}/api/admin/entry/${id}`, {
            method: "DELETE",
            credentials: "include",
          });

          const data = await res.json();

          if (!res.ok) {
            showAlert("error", data.error || "Failed to delete entry.");
            return;
          }

          showAlert("success", "Entry deleted successfully.");
          loadEntries();
        } catch {
          showAlert("error", "Failed to delete entry.");
        }
      }

      async function logoutAdmin() {
        await fetch('{BASE_URL}/api/logout', { method: "POST", credentials: "include" });
        window.location.href = "/admin-login.html";
      }

      async function init() {
        await checkAdmin();
        await loadUsers();
        await loadEntries();
      }

      init();
    </script>
  </body>
</html>
