<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - NodeVault</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav>
      <a href="/" class="nav-brand">NodeVault</a>
      <div class="nav-links">
        <a href="/signup.html" class="btn-nav-primary">Sign Up</a>
      </div>
    </nav>

    <div class="container" style="padding-top: 3rem">
      <div class="card">
        <div class="form-header">
          <h1>Welcome back</h1>
          <p>Sign in to access your dashboard.</p>
        </div>

        <div class="alert alert-error" id="alert-error"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="jane@example.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Your password"
              required
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Sign In
          </button>
        </form>

        <div class="form-footer">
          Don't have an account? <a href="/signup.html">Create one</a>
        </div>
      </div>
    </div>

    <script>
      const BASE_URL = "https://nodevault-backend-k0jb.onrender.com";
      const form = document.getElementById("login-form");
      const errorEl = document.getElementById("alert-error");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.classList.remove("show");

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';

        try {
          const res = await fetch(`${BASE_URL}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            const msg = data.errors
              ? data.errors.map((e) => e.msg).join(", ")
              : data.error;
            errorEl.textContent = msg || "Login failed.";
            errorEl.classList.add("show");
            return;
          }

          window.location.href = "/dashboard.html";
        } catch {
          errorEl.textContent = "Network error. Please try again.";
          errorEl.classList.add("show");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
